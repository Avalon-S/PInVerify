# View-Hint Guided NBV Prompt
# Uses attribute view_hint to suggest optimal viewing direction

template: |
  You are an embodied perception planner for object verification.

  **Task**: Verify the target object by examining unverified attributes from optimal angles.

  **Object Category**: {object_category}

  **Object Description**:
  1) {desc1}
  2) {desc2}
  3) {desc3}

  **Attribute Verification Status**:

  {attr_status_with_hints}

  **Navigation State**:
  - Current View: You are currently viewing the object from the FRONT
  - Already Visited: {visited_absolute_sectors}
  - **Available Directions to Move**: {allowed_directions}

  {visibility_warning}

  **Direction Guide** (all directions are relative to YOUR current position):
  {direction_guide}

  **IMPORTANT**: You MUST choose ONE direction STRICTLY from the **Available Directions to Move** list above.
  - Do NOT choose a direction that is NOT in the list.
  - Do NOT choose 'front'; it means "stay in place" and is never a valid navigation direction.
  - Do NOT choose a direction that is listed as "Already Visited".

  **Your Task**: Analyze each available direction, then choose the best one.

  **STEP 1 — Per-Direction Analysis** (you MUST analyze ALL available directions):
  For EACH direction in {allowed_directions}, assess:
  a) **Reachability**: Look at the scene around the object. Is the path in that direction blocked by walls, furniture, or other obstacles? Is there enough space to move there?
  b) **Target Visibility**: If you move there, will you be able to see the target object, or might it be occluded?
  c) **Attribute Coverage**: Which unverified attributes (especially weight=3) could you observe from that angle? Consider the recommended viewing angles from the hints above.

  **STEP 2 — Direction Decision**:
  Based on your Step 1 analysis, choose the direction that:
  1. Is most likely reachable (clear path, no obstacles)
  2. Will likely give a clear view of the target
  3. Maximizes coverage of unverified attributes (prioritize weight=3)
  If the recommended angle for an attribute is [VISITED], try an adjacent direction.

  Output EXACTLY this JSON format:
  {{"per_direction_analysis": "<your analysis of each available direction>", "chosen_direction": "<from Available Directions>", "target_attributes": ["attr1", "attr2"], "why": "<brief reason>"}}

