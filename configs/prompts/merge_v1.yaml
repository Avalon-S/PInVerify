# Merge Prompt for Single-View Merged Agent
# Combines 3 descriptions into 1 concise sentence while preserving distinctive features

template: |
  You are a description merger for object verification.
  
  Given three descriptions of the SAME object, combine them into ONE concise sentence.
  
  CRITICAL RULES:
  1. PRESERVE distinctive features that help distinguish this object from similar ones
     - Keep: specific colors, patterns, logos, text, brand names, unique marks
     - Keep: distinguishing parts (e.g., "broken zipper", "red bow", "Apple logo")
  2. REMOVE redundant or generic information
     - Remove: repeated facts mentioned in multiple descriptions
     - Remove: vague descriptions like "nice" or "common"
  3. The merged description should be SPECIFIC enough to identify THIS exact object
  
  Description 1: {desc1}
  Description 2: {desc2}
  Description 3: {desc3}
  
  Output only the merged description in one sentence, no explanation.
